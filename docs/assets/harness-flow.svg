<svg width="1080" height="560" viewBox="0 0 1080 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Office 2 Harness flow</title>
  <desc id="desc">A flow diagram showing task intake, difficulty routing, connector matching, execution, and self-reflection.</desc>
  <rect width="1080" height="560" rx="24" fill="#111318"/>
  <rect x="32" y="32" width="1016" height="496" rx="18" fill="#1A1D21" stroke="#30343A"/>
  <text x="64" y="78" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="28" font-weight="700">AI Office 2 Harness</text>
  <text x="64" y="106" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="15">Self-reflective routing for fast tasks, workroom execution, council debate, and connector-aware automation.</text>

  <g>
    <rect x="64" y="158" width="160" height="92" rx="12" fill="#222529" stroke="#3B82F6"/>
    <text x="92" y="194" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="17" font-weight="700">1. Task</text>
    <text x="92" y="222" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">User request</text>
  </g>

  <path d="M232 204H298" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="310" y="142" width="190" height="124" rx="12" fill="#222529" stroke="#22C55E"/>
    <text x="338" y="178" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="17" font-weight="700">2. Router</text>
    <text x="338" y="204" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">difficulty</text>
    <text x="338" y="224" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">risk flags</text>
    <text x="338" y="244" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">worker lanes</text>
  </g>

  <path d="M508 204H574" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="586" y="86" width="170" height="78" rx="12" fill="#172033" stroke="#60A5FA"/>
    <text x="616" y="118" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="16" font-weight="700">Fast</text>
    <text x="616" y="142" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="12">simple answer</text>
  </g>

  <g>
    <rect x="586" y="182" width="170" height="78" rx="12" fill="#17251C" stroke="#22C55E"/>
    <text x="616" y="214" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="16" font-weight="700">Workroom</text>
    <text x="616" y="238" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="12">assigned agents</text>
  </g>

  <g>
    <rect x="586" y="278" width="170" height="78" rx="12" fill="#2B2115" stroke="#F59E0B"/>
    <text x="616" y="310" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="16" font-weight="700">Debate</text>
    <text x="616" y="334" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="12">council decision</text>
  </g>

  <path d="M764 221H830" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M764 125C806 125 798 221 830 221" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M764 317C806 317 798 221 830 221" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="842" y="146" width="156" height="150" rx="12" fill="#222529" stroke="#A78BFA"/>
    <text x="870" y="182" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="17" font-weight="700">3. Execute</text>
    <text x="870" y="208" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">providers</text>
    <text x="870" y="228" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">MCP hints</text>
    <text x="870" y="248" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">local tools</text>
    <text x="870" y="268" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">vault memory</text>
  </g>

  <path d="M920 304V380C920 410 888 426 856 426H320C286 426 256 404 256 370V286" stroke="#6B7280" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <g>
    <rect x="334" y="382" width="300" height="84" rx="12" fill="#201A2A" stroke="#A78BFA"/>
    <text x="362" y="416" fill="#F4F7FB" font-family="Arial, sans-serif" font-size="17" font-weight="700">4. Self-reflection</text>
    <text x="362" y="442" fill="#B7BDC8" font-family="Arial, sans-serif" font-size="13">score, lesson, route history, next-run improvement</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L7 3L0 6V0Z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
